services:
  database:
    image: postgres:latest
    container_name: database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql
    networks:
      - app_network
  
  client:
    image: node:latest
    container_name: client
    working_dir: /client
    volumes:
      - ./client:/client
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run build && npm run start"
    networks:
      - app_network

  backend:
    image: node:latest
    container_name: backend
    working_dir: /backend
    volumes:
      - ./backend:/backend
    ports:
      - "7002:8000"
    command: sh -c "npm install && node app.js"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DB_HOST: database
    depends_on:
      - database
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge